name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/snow/careerk
            git pull origin main
            export PATH="/home/ubuntu/.local/share/fnm/node-versions/v22.22.3/installation/bin:$PATH"
            pnpm install
            pnpm prisma generate
            pnpm prisma migrate deploy
            pnpm run build
            pm2 restart careerk
